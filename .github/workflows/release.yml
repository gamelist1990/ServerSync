name: Release ServerSync

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binaries
        run: |
          bun run build:all

      - name: Prepare checksums
        run: |
          cd dist
          sha256sum serversync-linux-x64 > SHA256SUMS.txt
          sha256sum serversync-linux-arm64 >> SHA256SUMS.txt
          sha256sum serversync-windows-x64.exe >> SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/serversync-linux-x64
            dist/serversync-linux-arm64
            dist/serversync-windows-x64.exe
            dist/SHA256SUMS.txt
          generate_release_notes: true
